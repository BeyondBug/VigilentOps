apiVersion: 1

providers:
  - name: SecureGuard
    orgId: 1
    folder: SecureGuard
    folderUid: secureguard
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
