server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://sg-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wazuh
    static_configs:
      - targets: [localhost]
        labels:
          job: wazuh
          host: sg-wazuh
          __path__: /var/ossec/logs/alerts/alerts.json
